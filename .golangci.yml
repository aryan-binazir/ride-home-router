version: "2"

run:
  timeout: 5m
  relative-path-mode: gomod

linters:
  default: standard
  enable:
    - bodyclose
    - contextcheck
    - exhaustive
    - gosec
    - loggercheck
    - modernize
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - rowserrcheck
    - sloglint
    - sqlclosecheck
  exclusions:
    paths:
      - frontend

formatters:
  enable:
    - gofumpt
    - goimports
  exclusions:
    paths:
      - frontend

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
