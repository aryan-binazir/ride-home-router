{{range .}}
<button type="button" class="address-suggestion" data-address="{{if .FormattedAddress}}{{.FormattedAddress}}{{else}}{{.DisplayName}}{{end}}">
    {{if .FormattedAddress}}{{.FormattedAddress}}{{else}}{{.DisplayName}}{{end}}
</button>
{{else}}
<div class="address-no-results">No addresses found</div>
{{end}}
