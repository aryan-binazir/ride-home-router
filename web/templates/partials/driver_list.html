{{define "driver_list"}}
{{if .Drivers}}
<table>
    <thead>
        <tr>
            <th style="width: 42px;">
                <input type="checkbox"
                       class="form-checkbox"
                       aria-label="Select all visible drivers"
                       onclick="selectVisibleTableRows('drivers-tbody', this.checked)">
            </th>
            <th>Name</th>
            <th>Address</th>
            <th><abbr title="Available Capacity">Capacity</abbr></th>
            <th>Coordinates</th>
            <th style="width: 150px;">Actions</th>
        </tr>
    </thead>
    <tbody id="drivers-tbody">
        {{range .Drivers}}
        {{template "driver_row" dict "Driver" . "LabelIDs" (labelIDsFor $.LabelIDs .ID)}}
        {{end}}
    </tbody>
</table>
{{else}}
<div class="empty-state">
    <h3>No drivers yet</h3>
    <p>Click "Add Driver" to get started.</p>
</div>
{{end}}
{{end}}
