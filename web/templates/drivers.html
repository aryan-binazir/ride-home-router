{{define "content"}}
<div class="page-header">
    <div>
        <h2 class="page-title">Drivers</h2>
        <p class="page-subtitle">Add drivers and set the capacity of their personal vehicles. Vans are assigned later while planning each event.</p>
    </div>
    <div class="page-actions">
        <button class="btn btn-primary"
                hx-get="/api/v1/drivers/new"
                hx-target="#driver-form-container"
                hx-swap="innerHTML">
            Add Driver
        </button>
    </div>
</div>

<!-- Form Container (for add/edit forms) -->
<div id="driver-form-container" class="mb-4"></div>

<!-- Error Container -->
<div id="error-container"></div>

<section class="panel">
    <div class="panel-header">
        <div>
            <h3 class="panel-title">Driver Pool</h3>
            <p class="panel-subtitle">Maintain personal vehicle capacity and home addresses for routing.</p>
        </div>
    </div>

    <form id="driver-bulk-form">
        <div class="panel-toolbar panel-toolbar-stack">
            <div class="planner-toolbar-row">
                <input type="search"
                       id="drivers-management-search"
                       class="form-input form-input-search"
                       placeholder="Search drivers…"
                       aria-label="Search drivers"
                       oninput="filterTable(this, 'drivers-tbody')">
                <span class="panel-count text-muted">
                    <span id="drivers-bulk-selected-count">0</span> selected
                </span>
            </div>

            <div class="management-bulk-toolbar">
                <div class="management-bulk-controls">
                    <select name="group_id" class="form-select form-input-inline" {{if not .Groups}}disabled{{end}}>
                        <option value="">Choose group…</option>
                        {{range .Groups}}
                        <option value="{{.ID}}">{{.Name}}</option>
                        {{end}}
                    </select>
                    <button type="button"
                            class="btn btn-sm btn-outline"
                            onclick="selectVisibleTableRows('drivers-tbody', true)">
                        Select visible
                    </button>
                    <button type="button"
                            class="btn btn-sm btn-outline"
                            onclick="clearTableSelection('drivers-tbody')">
                        Clear selection
                    </button>
                </div>
                <div class="management-bulk-actions">
                    <button type="button"
                            class="btn btn-sm btn-outline"
                            {{if not .Groups}}disabled{{end}}
                            hx-post="/api/v1/drivers/groups/add"
                            hx-include="#driver-bulk-form select[name='group_id'], #driver-bulk-form input[name='driver_ids']:checked"
                            hx-target="#drivers-list"
                            hx-swap="innerHTML">
                        Add to group
                    </button>
                    <button type="button"
                            class="btn btn-sm btn-outline"
                            {{if not .Groups}}disabled{{end}}
                            hx-post="/api/v1/drivers/groups/remove"
                            hx-include="#driver-bulk-form select[name='group_id'], #driver-bulk-form input[name='driver_ids']:checked"
                            hx-target="#drivers-list"
                            hx-swap="innerHTML">
                        Remove from group
                    </button>
                </div>
            </div>
        </div>

        <div id="drivers-list" class="table-container mb-0">
            {{template "driver_list" .}}
        </div>
    </form>
</section>
{{end}}
