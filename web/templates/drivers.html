{{define "content"}}
<div class="page-header">
    <div>
        <h2 class="page-title">Drivers</h2>
        <p class="page-subtitle">Add drivers and set the capacity of their personal vehicles. Vans are assigned later while planning each event.</p>
    </div>
    <div class="page-actions">
        <button class="btn btn-primary"
                hx-get="/api/v1/drivers/new"
                hx-target="#driver-form-container"
                hx-swap="innerHTML"
                data-testid="add-driver-open-btn">
            Add Driver
        </button>
    </div>
</div>

<!-- Form Container (for add/edit forms) -->
<div id="driver-form-container" class="mb-4" data-testid="driver-form-container"></div>

<!-- Error Container -->
<div id="error-container"></div>

<section class="panel">
    <div class="panel-header">
        <div>
            <h3 class="panel-title">Driver Pool</h3>
            <p class="panel-subtitle">Maintain personal vehicle capacity and home addresses for routing.</p>
        </div>
    </div>

    <div class="panel-toolbar">
        <input type="search"
               class="form-input form-input-search"
               placeholder="Search drivers…"
               aria-label="Search drivers"
               oninput="filterTable(this, 'drivers-tbody')">
    </div>

    <div id="drivers-list" class="table-container mb-0" data-testid="drivers-list">
        {{template "driver_list" .}}
    </div>
</section>
{{end}}
