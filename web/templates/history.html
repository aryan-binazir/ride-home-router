{{define "content"}}
<div class="page-header">
    <div>
        <h2 class="page-title">Event History</h2>
        <p class="page-subtitle">Saved events and routes for quick reference.</p>
    </div>
</div>

<section class="panel">
    <div class="panel-header">
        <div>
            <h3 class="panel-title">Saved Runs</h3>
            <p class="panel-subtitle">Open an event to inspect route details, totals, and notes.</p>
        </div>
    </div>

    <div id="events-list" class="panel-body">
        {{template "event_list" .}}
    </div>
</section>
{{end}}
