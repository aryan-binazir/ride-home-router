{{define "content"}}
<div class="page-header">
    <div>
        <h2 class="page-title">Participants</h2>
        <p class="page-subtitle">Your roster of people who might need a ride. Addresses are geocoded automatically.</p>
    </div>
    <div class="page-actions">
        <button class="btn btn-primary"
                hx-get="/api/v1/participants/new"
                hx-target="#participant-form-container"
                hx-swap="innerHTML">
            Add Participant
        </button>
    </div>
</div>

<!-- Form Container (for add/edit forms) -->
<div id="participant-form-container" class="mb-4"></div>

<!-- Error Container -->
<div id="error-container"></div>

<section class="panel">
    <div class="panel-header">
        <div>
            <h3 class="panel-title">Roster</h3>
            <p class="panel-subtitle">Search, edit, and maintain the rider pool used during event planning.</p>
        </div>
    </div>

    <form id="participant-bulk-form">
        <div class="panel-toolbar panel-toolbar-stack">
            <div class="planner-toolbar-row">
                <input type="search"
                       id="participants-management-search"
                       class="form-input form-input-search"
                       placeholder="Search participants…"
                       aria-label="Search participants"
                       oninput="filterTable(this, 'participants-tbody')">
                <span class="panel-count text-muted">
                    <span id="participants-bulk-selected-count">0</span> selected
                </span>
            </div>

            <div class="management-bulk-toolbar">
                <div class="management-bulk-controls">
                    <select name="group_id" class="form-select form-input-inline" {{if not .Groups}}disabled{{end}}>
                        <option value="">Choose group…</option>
                        {{range .Groups}}
                        <option value="{{.ID}}">{{.Name}}</option>
                        {{end}}
                    </select>
                    <button type="button"
                            class="btn btn-sm btn-outline"
                            onclick="selectVisibleTableRows('participants-tbody', true)">
                        Select visible
                    </button>
                    <button type="button"
                            class="btn btn-sm btn-outline"
                            onclick="clearTableSelection('participants-tbody')">
                        Clear selection
                    </button>
                </div>
                <div class="management-bulk-actions">
                    <button type="button"
                            class="btn btn-sm btn-outline"
                            {{if not .Groups}}disabled{{end}}
                            hx-post="/api/v1/participants/groups/add"
                            hx-include="#participant-bulk-form select[name='group_id'], #participant-bulk-form input[name='participant_ids']:checked"
                            hx-target="#participants-list"
                            hx-swap="innerHTML">
                        Add to group
                    </button>
                    <button type="button"
                            class="btn btn-sm btn-outline"
                            {{if not .Groups}}disabled{{end}}
                            hx-post="/api/v1/participants/groups/remove"
                            hx-include="#participant-bulk-form select[name='group_id'], #participant-bulk-form input[name='participant_ids']:checked"
                            hx-target="#participants-list"
                            hx-swap="innerHTML">
                        Remove from group
                    </button>
                </div>
            </div>
        </div>

        <div id="participants-list" class="table-container mb-0">
            {{template "participant_list" .}}
        </div>
    </form>
</section>
{{end}}
